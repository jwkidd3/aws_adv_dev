AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Description: >
  Cloud Air Flights Microservice — SAM template for Lab 4.
  Deploys a Lambda function + HTTP API that serves GET /flights from DynamoDB.
  An optional HTTP_PROXY catch-all route forwards every other path to the
  legacy Elastic Beanstalk monolith (Strangler Facade — used in Lab 4b).

# ── Parameters ────────────────────────────────────────────────────────────────
Parameters:

  UserId:
    Type: String
    Description: Student user ID (e.g. user1). Namespaces all resource names.
    AllowedPattern: "^user[0-9]+"
    ConstraintDescription: Must be of the form userN (e.g. user1, user12).

  BookingsTableName:
    Type: String
    Description: >
      Name of the existing DynamoDB Bookings table created by the Lab 2a
      CloudFormation base stack (e.g. Bookings-user1).

  MonolithUrl:
    Type: String
    Default: "REPLACE_WITH_EB_CNAME"
    Description: >
      HTTP URL of the Elastic Beanstalk monolith (e.g. http://cloudair-user1-env.us-east-1.elasticbeanstalk.com).
      Used in Lab 4b for the catch-all HTTP_PROXY route. Leave the default
      value when deploying for Lab 4a only.

# ── Conditions ────────────────────────────────────────────────────────────────
# The Strangler catch-all proxy resources are only created once a REAL monolith
# URL is supplied (Lab 4b). With the Lab 4a placeholder they are skipped, so the
# Lab 4a deploy isn't blocked by an invalid HTTP_PROXY integration URI.
Conditions:
  HasMonolithUrl: !Not [!Equals [!Ref MonolithUrl, "REPLACE_WITH_EB_CNAME"]]

# ── Globals ───────────────────────────────────────────────────────────────────
Globals:
  Function:
    Runtime: python3.12
    Architectures: [arm64]
    Timeout: 15
    Tracing: Active
    Environment:
      Variables:
        BOOKINGS_TABLE: !Ref BookingsTableName
        POWERTOOLS_SERVICE_NAME: !Sub "cloudair-${UserId}-flights"
        LOG_LEVEL: INFO

# ── Resources ─────────────────────────────────────────────────────────────────
Resources:

  # ── HTTP API (payload format version 2.0) ───────────────────────────────────
  FlightsApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      Tags:
        Project: CloudAir
        Owner: !Ref UserId

  # ── Flights Lambda Function ──────────────────────────────────────────────────
  FlightsFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "cloudair-${UserId}-flights"
      Handler: app.handler
      CodeUri: src/
      Description: "Cloud Air Flights microservice — returns available flights from DynamoDB."
      Policies:
        # Read-only access to the Bookings/Flights table
        - DynamoDBReadPolicy:
            TableName: !Ref BookingsTableName
      Events:
        # Extracted route: GET /flights
        GetFlights:
          Type: HttpApi
          Properties:
            ApiId: !Ref FlightsApi
            Path: /flights
            Method: GET
        # Optional: GET /flights/{flightId} for single-flight lookup
        GetFlightById:
          Type: HttpApi
          Properties:
            ApiId: !Ref FlightsApi
            Path: /flights/{flightId}
            Method: GET

  # ── Strangler Facade: HTTP_PROXY catch-all to the EB monolith (Lab 4b) ──────
  # This integration forwards every request that does NOT match /flights to the
  # legacy Elastic Beanstalk environment.  It is wired up in Lab 4b by setting
  # the MonolithUrl parameter to your EB environment CNAME.
  #
  # AWS SAM does not natively model a pure HTTP_PROXY integration on HttpApi;
  # the resource below uses the escape-hatch AWS::ApiGatewayV2 resources so the
  # SAM template remains the single source of truth.

  MonolithIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Condition: HasMonolithUrl
    Properties:
      ApiId: !Ref FlightsApi
      IntegrationType: HTTP_PROXY
      IntegrationMethod: ANY
      IntegrationUri: !Sub "${MonolithUrl}/{proxy}"
      PayloadFormatVersion: "1.0"

  MonolithCatchAllRoute:
    Type: AWS::ApiGatewayV2::Route
    Condition: HasMonolithUrl
    Properties:
      ApiId: !Ref FlightsApi
      RouteKey: "ANY /{proxy+}"
      Target: !Sub "integrations/${MonolithIntegration}"

  # NOTE: No explicit AWS::ApiGatewayV2::Stage or AWS::ApiGatewayV2::Deployment
  # resource is needed here. AWS::Serverless::HttpApi with StageName: prod already
  # creates the prod stage with AutoDeploy enabled. Adding a second resource with
  # StageName: prod would conflict (ConflictException). The MonolithCatchAllRoute
  # above is picked up automatically by the HttpApi's own auto-deployment.

# ── Outputs ───────────────────────────────────────────────────────────────────
Outputs:

  FlightsApiUrl:
    Description: Base URL of the Flights HTTP API (add /flights to query)
    Value: !Sub "https://${FlightsApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
    Export:
      Name: !Sub "cloudair-${UserId}-flights-api-url"

  FlightsFunctionArn:
    Description: ARN of the Flights Lambda function
    Value: !GetAtt FlightsFn.Arn
    Export:
      Name: !Sub "cloudair-${UserId}-flights-fn-arn"

  FlightsFunctionName:
    Description: Name of the Flights Lambda function (used with sam logs)
    Value: !Ref FlightsFn
    Export:
      Name: !Sub "cloudair-${UserId}-flights-fn-name"

AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Description: >
  Cloud Air Flights Microservice — SAM template for Lab 4.
  Deploys a Lambda function + HTTP API that serves GET /flights from DynamoDB.
  An optional HTTP_PROXY catch-all route forwards every other path to the
  legacy Elastic Beanstalk monolith (Strangler Facade — used in Lab 4b).

# ── Parameters ────────────────────────────────────────────────────────────────
Parameters:

  UserId:
    Type: String
    Description: Student user ID (e.g. user1). Namespaces all resource names.
    AllowedPattern: "^user[0-9]+"
    ConstraintDescription: Must be of the form userN (e.g. user1, user12).

  BookingsTableName:
    Type: String
    Description: >
      Name of the existing DynamoDB Bookings table created by the Lab 2a
      CloudFormation base stack (e.g. Bookings-user1).

  MonolithUrl:
    Type: String
    Default: "http://replace-me.invalid"
    Description: >
      HTTP URL of the Elastic Beanstalk monolith (e.g. http://cloudair-user1-env.us-east-1.elasticbeanstalk.com).
      The catch-all proxy route always exists; in Lab 4a it points at this dummy
      URL (so the URI is well-formed and the deploy succeeds — only /flights is
      tested), and Lab 4b sets the real EB CNAME to make the strangler live. The
      default MUST keep the http:// scheme so API Gateway accepts the integration.

# ── Globals ───────────────────────────────────────────────────────────────────
Globals:
  Function:
    Runtime: python3.12
    Architectures: [arm64]
    Timeout: 15
    Tracing: Active
    Environment:
      Variables:
        BOOKINGS_TABLE: !Ref BookingsTableName
        POWERTOOLS_SERVICE_NAME: !Sub "cloudair-${UserId}-flights"
        LOG_LEVEL: INFO

# ── Resources ─────────────────────────────────────────────────────────────────
Resources:

  # ── HTTP API (payload format version 2.0) ───────────────────────────────────
  # The Strangler catch-all (ANY /{proxy+} -> EB monolith) lives in this API's
  # DefinitionBody, NOT as a separate AWS::ApiGatewayV2::Route. Escape-hatch route
  # resources get silently dropped whenever SAM regenerates the HttpApi definition
  # on a later deploy (e.g. when Lab 7a adds the JWT authorizer) — putting the
  # proxy in the managed definition makes it survive redeploys. SAM merges the
  # FlightsFn GET /flights events into this body automatically. `security: []`
  # keeps the proxy open even after a DefaultAuthorizer is added in Lab 7a.
  # The route is always present; MonolithUrl points it at a dummy in Lab 4a and
  # the real EB CNAME in Lab 4b.
  FlightsApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      DefinitionBody:
        openapi: "3.0.1"
        info:
          title: !Sub "cloudair-${UserId}-flights"
          version: "1.0"
        paths:
          "/{proxy+}":
            x-amazon-apigateway-any-method:
              security: []
              x-amazon-apigateway-integration:
                type: http_proxy
                httpMethod: ANY
                uri: !Sub "${MonolithUrl}/{proxy}"
                connectionType: INTERNET
                payloadFormatVersion: "1.0"
      Tags:
        Project: CloudAir
        Owner: !Ref UserId

  # ── Flights Lambda Function ──────────────────────────────────────────────────
  FlightsFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "cloudair-${UserId}-flights"
      Handler: app.handler
      CodeUri: src/
      Description: "Cloud Air Flights microservice — returns available flights from DynamoDB."
      Policies:
        # Read-only access to the Bookings/Flights table
        - DynamoDBReadPolicy:
            TableName: !Ref BookingsTableName
      Events:
        # Extracted route: GET /flights
        GetFlights:
          Type: HttpApi
          Properties:
            ApiId: !Ref FlightsApi
            Path: /flights
            Method: GET
        # Optional: GET /flights/{flightId} for single-flight lookup
        GetFlightById:
          Type: HttpApi
          Properties:
            ApiId: !Ref FlightsApi
            Path: /flights/{flightId}
            Method: GET

# ── Outputs ───────────────────────────────────────────────────────────────────
Outputs:

  FlightsApiUrl:
    Description: Base URL of the Flights HTTP API (add /flights to query)
    Value: !Sub "https://${FlightsApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
    Export:
      Name: !Sub "cloudair-${UserId}-flights-api-url"

  FlightsFunctionArn:
    Description: ARN of the Flights Lambda function
    Value: !GetAtt FlightsFn.Arn
    Export:
      Name: !Sub "cloudair-${UserId}-flights-fn-arn"

  FlightsFunctionName:
    Description: Name of the Flights Lambda function (used with sam logs)
    Value: !Ref FlightsFn
    Export:
      Name: !Sub "cloudair-${UserId}-flights-fn-name"
